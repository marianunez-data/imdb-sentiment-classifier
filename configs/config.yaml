project:
  name: "imdb-sentiment-classifier"
  version: "2.0.0"
  random_seed: 42
  description: "Production-grade binary sentiment classifier for IMDB movie reviews"

data:
  raw_path: "data/imdb_reviews.tsv"
  separator: "\t"
  text_column: "review"
  target_column: "pos"
  split_column: "ds_part"
  train_label: "train"
  test_label: "test"
  min_review_length: 10
  max_review_length: 15000

preprocessing:
  spacy_model: "en_core_web_sm"
  negation_words: ["no", "not", "n't", "never", "none", "hardly", "scarcely", "barely"]
  tfidf:
    min_df: 0.005
    max_df: 0.90
    ngram_range: [1, 2]
    max_features: 50000
    sublinear_tf: true

models:
  baseline:
    strategy: "stratified"
  logistic_regression:
    solver: "liblinear"
    max_iter: 1000
    C: 1.0
  lgbm:
    n_estimators: 200
    learning_rate: 0.1
    num_leaves: 31
    random_state: 42

tuning:
  n_trials: 50
  cv_folds: 5
  scoring_metric: "f1"
  timeout: 600

bert:
  model_name: "distilbert-base-uncased"
  max_length: 256
  batch_size: 32
  learning_rate: 2.0e-5
  epochs: 3
  lora_r: 8
  lora_alpha: 32
  lora_dropout: 0.1
  warmup_ratio: 0.1

threshold:
  search_range: [0.1, 0.9]
  step: 0.01
  optimize_for: "f1"

calibration:
  methods: ["isotonic", "sigmoid"]
  cv_folds: 5

evaluation:
  bootstrap_n_iterations: 1000
  confidence_level: 0.95

mlflow:
  tracking_uri: "mlruns"
  experiment_name: "imdb-sentiment"

api:
  host: "0.0.0.0"
  port: 8000
  model_path: "models/lr_tuned_calibrated_pipeline.joblib"

monitoring:
  reference_data_ratio: 0.5

paths:
  models_dir: "models"
  reports_dir: "reports/figures"
  metrics_dir: "reports/metrics"
  logs_dir: "logs"
